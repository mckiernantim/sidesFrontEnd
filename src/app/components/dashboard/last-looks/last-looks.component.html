<main [@fadeInOut] class="last-looks-container h-screen">
  <div class="flex h-full">
    <!-- Document Viewer (Main Content) -->
    <div class="w-full flex flex-col overflow-hidden min-w-0 h-full">
      <!-- Pagination Controls -->
      <div class="bg-sw-surface p-4 border-b border-sw-border">
        <div class="flex justify-between items-center space-x-2">
          <button 
            class="flex-1 px-4 py-2 border border-sw-border text-sw-text-muted rounded-lg hover:border-sw-accent hover:text-sw-accent transition-colors disabled:opacity-40 disabled:cursor-not-allowed bg-transparent"
            (click)="previousPage()" 
            [disabled]="currentPageIndex === 0">
            ‹‹ Previous
          </button>
          <div class="flex items-center justify-center px-4 text-sw-text-muted font-medium whitespace-nowrap">
            Page {{currentPageIndex + 1}} of {{pages?.length || 0}}
          </div>
          <button 
            class="flex-1 px-4 py-2 border border-sw-border text-sw-text-muted rounded-lg hover:border-sw-accent hover:text-sw-accent transition-colors disabled:opacity-40 disabled:cursor-not-allowed bg-transparent"
            (click)="nextPage()" 
            [disabled]="currentPageIndex === (pages?.length - 1)">
            Next ››
          </button>
        </div>
      </div>
      <div class="page-container h-full">
        <app-last-looks-page 
          [page]="currentPage"
          [canEditDocument]="canEditDocument"
          [selectedLine]="selectedLine"
          [currentPageIndex]="currentPageIndex"
          [totalPages]="pages.length"
          [editMode]="editState"
          (lineChanged)="handleLineChange($event)"
          (lineSelected)="handleLineSelected($event)"
          (categoryChanged)="handleCategoryChange($event)"
          (positionChanged)="handlePositionChange($event)"
          (pageUpdate)="handlePageUpdate($event)"
          (proceedToCheckout)="handleProceedToCheckout()"
          (toggleVisibilityRequest)="handleToggleVisibilityRequest()"
          (pageChange)="handlePageChange($event)">
        </app-last-looks-page>
      </div>
    </div>
  </div>
</main>
