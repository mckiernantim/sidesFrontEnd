<div class="flex flex-col items-center justify-center py-4">
  <img src="assets/animations/ScriptBot_Animation-BW.gif" alt="Processing..." class="w-48 h-48 mb-4">
  <div class="text-center max-w-md">
    <h3 class="text-lg font-semibold text-indigo-700 mb-2">Processing Your Document</h3>
    <div class="mb-4">
      <p class="text-sm text-gray-500 mb-1">
        Step <span class="font-semibold">{{ currentStep }}</span> of <span class="font-semibold">{{ totalSteps }}</span>
      </p>
      <p class="text-gray-700 font-medium">{{ message }}</p>
    </div>
    <div class="w-full bg-gray-200 rounded-full h-3 mb-4">
      <div 
        class="bg-gradient-to-r from-indigo-500 to-indigo-600 h-3 rounded-full transition-all duration-500"
        [style.width.%]="progress"
      ></div>
    </div>
    <div class="flex items-center justify-center space-x-2 text-sm text-gray-500">
      <svg class="animate-spin h-4 w-4 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <span>Processing...</span>
    </div>
  </div>
</div>
