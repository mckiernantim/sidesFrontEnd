<div class="overflow-x-auto">
  <table class="min-w-full bg-sw-surface border border-sw-border">
    <thead>
      <tr class="bg-sw-surface-2">
        <th *ngIf="selectable" class="w-10 px-4 py-2"></th>
        
        <th *ngFor="let column of columns" 
            class="px-4 py-2 text-left text-sm font-medium text-sw-text-muted uppercase tracking-wider cursor-pointer hover:text-sw-text transition-colors"
            (click)="sort(column.key)">
          {{ column.header }}
          <span *ngIf="sortColumn === column.key" class="text-sw-accent">
            {{ sortDirection === 'asc' ? '↑' : '↓' }}
          </span>
        </th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of sortedData" 
          class="border-t border-sw-border hover:bg-sw-surface-2 transition-colors"
          [class.bg-sw-surface-2]="isSelected(item)"
          [class.border-l-2]="isSelected(item)"
          [class.border-l-sw-accent]="isSelected(item)">
        <td *ngIf="selectable" class="w-10 px-4 py-2">
          <input type="checkbox" 
                 [checked]="isSelected(item)"
                 (click)="toggleSelection($event, item)"
                 class="form-checkbox h-5 w-5"
                 style="accent-color: var(--sw-accent);">
        </td>
        <td *ngFor="let column of columns" class="px-4 py-2 text-sw-text text-sm">
          <ng-container *ngIf="column.cell; else defaultCell">
            {{ column.cell(item) }}
          </ng-container>
          <ng-template #defaultCell>
            {{ item[column.key] }}
          </ng-template>
        </td>
      </tr>
      <tr *ngIf="data.length === 0">
        <td [attr.colspan]="columns.length + (selectable ? 1 : 0)" class="px-4 py-4 text-center text-sw-text-muted italic">
          No data available
        </td>
      </tr>
    </tbody>
  </table>
</div>

<div *ngIf="pagination && totalPages > 1" class="flex items-center justify-between px-4 py-3 bg-sw-surface border-t border-sw-border sm:px-6">
  <div class="flex justify-between sm:hidden">
    <button [disabled]="currentPage === 1"
            (click)="goToPage(currentPage - 1)"
            class="relative inline-flex items-center px-4 py-2 text-sm font-medium rounded-md text-sw-text-muted bg-sw-surface-2 border border-sw-border hover:border-sw-accent hover:text-sw-accent transition-colors"
            [ngClass]="{'opacity-50 cursor-not-allowed': currentPage === 1}">
      Previous
    </button>
    <button [disabled]="currentPage === totalPages"
            (click)="goToPage(currentPage + 1)"
            class="ml-3 relative inline-flex items-center px-4 py-2 text-sm font-medium rounded-md text-sw-text-muted bg-sw-surface-2 border border-sw-border hover:border-sw-accent hover:text-sw-accent transition-colors"
            [ngClass]="{'opacity-50 cursor-not-allowed': currentPage === totalPages}">
      Next
    </button>
  </div>
  <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
    <div>
      <p class="text-sm text-sw-text-muted">
        Showing
        <span class="font-medium text-sw-text">{{ (currentPage - 1) * pageSize + 1 }}</span>
        to
        <span class="font-medium text-sw-text">{{ Math.min(currentPage * pageSize, data.length) }}</span>
        of
        <span class="font-medium text-sw-text">{{ data.length }}</span>
        results
      </p>
    </div>
    <div>
      <nav class="relative z-0 inline-flex rounded-md -space-x-px" aria-label="Pagination">
        <button [disabled]="currentPage === 1"
                (click)="goToPage(currentPage - 1)"
                class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-sw-border bg-sw-surface-2 text-sm font-medium text-sw-text-muted hover:text-sw-accent hover:border-sw-accent transition-colors"
                [ngClass]="{'opacity-50 cursor-not-allowed': currentPage === 1}">
          <span class="sr-only">Previous</span>
          &laquo;
        </button>
        <ng-container *ngFor="let page of [].constructor(totalPages); let i = index">
          <button (click)="goToPage(i + 1)"
                  [ngClass]="{
                    'bg-sw-surface-2 border-sw-accent text-sw-accent': currentPage === i + 1,
                    'bg-sw-surface border-sw-border text-sw-text-muted hover:text-sw-text': currentPage !== i + 1
                  }"
                  class="relative inline-flex items-center px-4 py-2 border text-sm font-medium transition-colors">
            {{ i + 1 }}
          </button>
        </ng-container>
        <button [disabled]="currentPage === totalPages"
                (click)="goToPage(currentPage + 1)"
                class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-sw-border bg-sw-surface-2 text-sm font-medium text-sw-text-muted hover:text-sw-accent hover:border-sw-accent transition-colors"
                [ngClass]="{'opacity-50 cursor-not-allowed': currentPage === totalPages}">
          <span class="sr-only">Next</span>
          &raquo;
        </button>
      </nav>
    </div>
  </div>
</div>
