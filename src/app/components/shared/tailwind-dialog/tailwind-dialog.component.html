<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center">
  <!-- Background overlay -->
  <div class="fixed inset-0 bg-black bg-opacity-80"></div>
  
  <!-- Centered container -->
  <div class="relative z-50 w-full max-w-lg mx-4">
    <div class="bg-sw-surface border border-sw-border rounded-lg shadow-xl">
      <!-- Content -->
      <div class="px-4 pt-5 pb-4 sm:p-6">
        <div class="text-center">
          <h3 *ngIf="title" class="text-lg font-semibold text-sw-text mb-4 font-display">
            {{ title }}
          </h3>
          <!-- Dynamic component container -->
          <ng-container #dynamicComponentContainer></ng-container>
          <!-- HTML content (fallback) -->
          <div *ngIf="!componentType" [innerHTML]="safeContent" class="text-sw-text"></div>
        </div>
      </div>
      
      <!-- Actions -->
      <div class="px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse justify-center space-x-3 border-t border-sw-border">
        <ng-container *ngFor="let action of actions">
          <button
            type="button"
            [ngClass]="{
              'bg-sw-accent text-sw-bg hover:opacity-90': action.style === 'primary',
              'bg-sw-surface-2 text-sw-text border border-sw-border hover:bg-sw-border': action.style === 'secondary',
              'bg-sw-danger text-white hover:opacity-90': action.style === 'danger'
            }"
            class="inline-flex w-full justify-center rounded-md px-4 py-2 text-sm font-medium shadow-sm sm:w-auto transition-all duration-150"
            (click)="onAction(action.value)"
          >
            {{ action.label }}
          </button>
        </ng-container>
      </div>
    </div>
  </div>
</div>
<div *ngIf="isOpen && !disableClose" class="fixed inset-0 z-40 bg-black opacity-50" (click)="onClose()"></div>
