<div class="flex flex-col justify-center items-center w-full space-y-4">
  <form class="space-y-4 w-full">

    <div>
      <button
        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500"
        (click)="emitValue()"
      >
        Update Watermark
      </button>
    </div>

    <div *ngIf="hasWatermark">
      <button
        type="button"
        class="w-full flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
        (click)="removeWatermark()"
      >
        Remove Watermark
      </button>
    </div>
    
    <!-- Actor/Recipient Name -->
    <div>
      <label for="watermark" class="block text-sm font-medium text-gray-700">Actor Name</label>
      <div class="mt-1">
        <input
          class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
          type="text"
          id="watermark"
          name="watermark"
          placeholder="Enter actor name..."
          [(ngModel)]="waterMark"
          [ngModelOptions]="{standalone: true}"
        >
      </div>
    </div>
    
    <!-- Casting Director/Company (only shown in casting mode) -->
    <div *ngIf="showCastingDirector">
      <label for="castingDirector" class="block text-sm font-medium text-gray-700">
        Casting Director / Company
      </label>
      <div class="mt-1">
        <input
          class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
          type="text"
          id="castingDirector"
          name="castingDirector"
          placeholder="Enter casting director or company..."
          [(ngModel)]="castingDirector"
          [ngModelOptions]="{standalone: true}"
        >
      </div>
      <p class="mt-1 text-xs text-gray-500">Appears below the timestamp on each page</p>
    </div>
  </form>
</div>
