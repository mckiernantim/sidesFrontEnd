<div class="flex flex-col justify-center items-center w-full space-y-4">
  <form class="space-y-4 w-full">

    <div>
      <button
        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-semibold text-sw-accent-fg bg-sw-accent hover:bg-sw-accent-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sw-accent transition-colors"
        (click)="emitValue()"
      >
        Update Watermark
      </button>
    </div>

    <div *ngIf="hasWatermark">
      <button
        type="button"
        class="w-full flex justify-center py-2 px-4 border border-sw-border rounded-md shadow-sm text-sm font-medium text-sw-text-muted bg-sw-surface-2 hover:border-sw-danger hover:text-sw-danger focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sw-danger transition-colors"
        (click)="removeWatermark()"
      >
        Remove Watermark
      </button>
    </div>
    
    <!-- Actor/Recipient Name -->
    <div>
      <label for="watermark" class="block text-sm font-medium text-sw-text-muted">Actor Name</label>
      <div class="mt-1">
        <input
          class="block w-full px-3 py-2 bg-sw-surface-2 border border-sw-border rounded-md shadow-sm text-sw-text placeholder-sw-text-subtle focus:outline-none focus:ring-1 focus:ring-sw-accent focus:border-sw-accent sm:text-sm transition-colors"
          type="text"
          id="watermark"
          name="watermark"
          placeholder="Enter actor name..."
          [(ngModel)]="waterMark"
          [ngModelOptions]="{standalone: true}"
        >
      </div>
    </div>
    
    <!-- Casting Director/Company (only shown in casting mode) -->
    <div *ngIf="showCastingDirector">
      <label for="castingDirector" class="block text-sm font-medium text-sw-text-muted">
        Casting Director / Company
      </label>
      <div class="mt-1">
        <input
          class="block w-full px-3 py-2 bg-sw-surface-2 border border-sw-border rounded-md shadow-sm text-sw-text placeholder-sw-text-subtle focus:outline-none focus:ring-1 focus:ring-sw-accent focus:border-sw-accent sm:text-sm transition-colors"
          type="text"
          id="castingDirector"
          name="castingDirector"
          placeholder="Enter casting director or company..."
          [(ngModel)]="castingDirector"
          [ngModelOptions]="{standalone: true}"
        >
      </div>
      <p class="mt-1 text-xs text-sw-text-subtle">Appears below the timestamp on each page</p>
    </div>
  </form>
</div>
