<div class="shoot-day-card bg-white rounded-lg shadow-md border border-gray-200 overflow-hidden">
  <!-- Day Header -->
  <div class="flex items-center justify-between p-4 bg-gradient-to-r from-indigo-50 to-purple-50 border-b border-indigo-100">
    <div>
      <h3 class="text-lg font-bold text-indigo-900">{{ dayLabel }}</h3>
      <div *ngIf="day?.primaryLocation" class="text-sm text-indigo-700">
        📍 {{ day.primaryLocation }}
      </div>
    </div>
    <div class="flex items-center space-x-4 text-sm">
      <div class="text-center">
        <div class="font-bold text-indigo-800">{{ formattedPageCount }}</div>
        <div class="text-xs text-gray-500">pages</div>
      </div>
      <div class="text-center">
        <div class="font-bold text-indigo-800">{{ formattedTotalTime }}</div>
        <div class="text-xs text-gray-500">est. time</div>
      </div>
      <div class="text-center">
        <div class="font-bold text-indigo-800">{{ day?.scenes?.length || 0 }}</div>
        <div class="text-xs text-gray-500">scenes</div>
      </div>
      <button
        *ngIf="editable"
        (click)="onRemoveDay()"
        class="text-gray-400 hover:text-red-500 transition-colors ml-2"
        title="Remove shoot day">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Cast Summary -->
  <div class="px-4 py-2 text-xs text-gray-500 bg-gray-50 border-b">
    {{ castSummary }}
  </div>

  <!-- Scene List (Drop Zone) -->
  <div
    class="scene-list p-2 min-h-[60px]"
    cdkDropList
    [id]="dropListId"
    [cdkDropListData]="day?.scenes || []"
    [cdkDropListConnectedTo]="connectedDropLists"
    [cdkDropListDisabled]="!editable"
    (cdkDropListDropped)="onSceneDrop($event)">

    <div
      *ngFor="let scene of day?.scenes; trackBy: trackBySceneId"
      cdkDrag
      [cdkDragData]="scene"
      [cdkDragDisabled]="!editable"
      class="mb-1">
      <app-scene-strip
        [scene]="scene"
        [editable]="editable"
        [showTimeline]="true"
        (sceneClicked)="onSceneClicked($event)"
        (removeScene)="onSceneRemoved($event)"
        (timeChanged)="onTimeChanged($event)">
      </app-scene-strip>
    </div>

    <!-- Empty State -->
    <div
      *ngIf="!day?.scenes?.length"
      class="text-center py-6 text-gray-400 text-sm italic border-2 border-dashed border-gray-200 rounded-md">
      Drop scenes here
    </div>
  </div>
</div>
